version: 2.1

environment: &env
  DOCKER_REPO: lerisngwa/landmark-web-app

jobs:
  test-and-build:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: npm ci
      - run:
          name: Run frontend tests
          command: npm test
      - run:
          name: Build frontend
          command: npm run build
      - run:
          name: Install server dependencies
          command: cd server && npm ci
      - run:
          name: Run server tests
          command: cd server && npm test

  deploy-dev:
    docker:
      - image: cimg/node:18.0
    environment:
      <<: *env
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo "$DOCKERHUB_PASSWORD" | docker login --username $DOCKERHUB_USERNAME --password-stdin
            docker build -t $DOCKER_REPO:$IMAGE_TAG .
            docker push $DOCKER_REPO:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (develop namespace)
          command: |
            aws eks update-kubeconfig --name landmark-eks-cluster --region us-east-1
            sed -i 's/namespace: landmark/namespace: develop/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: $DOCKER_REPO:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/

  deploy-stg:
    docker:
      - image: cimg/node:18.0
    environment:
      <<: *env
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo "$DOCKERHUB_PASSWORD" | docker login --username $DOCKERHUB_USERNAME --password-stdin
            docker build -t $DOCKER_REPO:$IMAGE_TAG .
            docker push $DOCKER_REPO:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (staging namespace)
          command: |
            aws eks update-kubeconfig --name landmark-eks-cluster --region us-east-1
            sed -i 's/namespace: landmark/namespace: staging/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: $DOCKER_REPO:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/

  deploy-prod:
    docker:
      - image: cimg/node:18.0
    environment:
      <<: *env
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo "$DOCKERHUB_PASSWORD" | docker login --username $DOCKERHUB_USERNAME --password-stdin
            docker build -t $DOCKER_REPO:$IMAGE_TAG .
            docker push $DOCKER_REPO:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (production namespace)
          command: |
            aws eks update-kubeconfig --name landmark-eks-cluster --region us-east-1
            sed -i 's/namespace: landmark/namespace: production/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: $DOCKER_REPO:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/

workflows:
  pipeline:
    jobs:
      - test-and-build:
          filters:
            branches:
              only: /.*/
      - deploy-dev:
          requires:
            - test-and-build
          filters:
            branches:
              only: develop
      - deploy-stg:
          requires:
            - test-and-build
          filters:
            branches:
              only: /^release.*/
      - deploy-prod:
          requires:
            - test-and-build
          filters:
            branches:
              only:
                - main
                - /^hotfix.*/
