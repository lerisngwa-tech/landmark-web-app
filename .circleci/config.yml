version: 2.1

orbs:
  kubernetes: circleci/kubernetes@1.3

commands:
  install-aws-cli:
    steps:
      - run:
          name: Install AWS CLI
          command: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
            unset AWS_DEFAULT_REGION
            aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
            aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
            aws configure set region us-east-1
            echo "export AWS_DEFAULT_REGION=us-east-1" >> $BASH_ENV
            echo "export AWS_REGION=us-east-1" >> $BASH_ENV
      - run:
          name: Verify AWS credentials
          command: |
            echo "Region: $(aws configure get region)"
            aws sts get-caller-identity

  build-and-push:
    steps:
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo "$DOCKERHUB_PASSWORD" | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker build -t lerisngwa/landmark-web-app:$IMAGE_TAG .
            docker push lerisngwa/landmark-web-app:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV

jobs:
  test-and-build:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: npm install
      - run:
          name: Run frontend tests
          command: npm test
      - run:
          name: Build frontend
          command: npm run build
      - run:
          name: Install server dependencies
          command: cd server && npm install
      - run:
          name: Run server tests
          command: cd server && npm test

  deploy-dev:
    docker:
      - image: cimg/node:18.0
    environment:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - checkout
      - setup_remote_docker
      - install-aws-cli
      - kubernetes/install-kubectl
      - build-and-push
      - run:
          name: Deploy to Kubernetes (develop namespace)
          command: |
            aws eks update-kubeconfig --name landmark-eks-cluster --region us-east-1
            sed -i 's/name: landmark/name: develop/g' k8s/namespace.yml
            kubectl apply -f k8s/namespace.yml
            kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/develop --timeout=30s
            sed -i 's/namespace: landmark/namespace: develop/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest.*|image: lerisngwa/landmark-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/

  deploy-stg:
    docker:
      - image: cimg/node:18.0
    environment:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - checkout
      - setup_remote_docker
      - install-aws-cli
      - kubernetes/install-kubectl
      - build-and-push
      - run:
          name: Deploy to Kubernetes (staging namespace)
          command: |
            aws eks update-kubeconfig --name landmark-eks-cluster --region us-east-1
            sed -i 's/name: landmark/name: staging/g' k8s/namespace.yml
            kubectl apply -f k8s/namespace.yml
            kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/staging --timeout=30s
            sed -i 's/namespace: landmark/namespace: staging/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest.*|image: lerisngwa/landmark-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/

  deploy-prod:
    docker:
      - image: cimg/node:18.0
    environment:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - checkout
      - setup_remote_docker
      - install-aws-cli
      - kubernetes/install-kubectl
      - build-and-push
      - run:
          name: Deploy to Kubernetes (production namespace)
          command: |
            aws eks update-kubeconfig --name landmark-eks-cluster --region us-east-1
            sed -i 's/name: landmark/name: production/g' k8s/namespace.yml
            kubectl apply -f k8s/namespace.yml
            kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/production --timeout=30s
            sed -i 's/namespace: landmark/namespace: production/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest.*|image: lerisngwa/landmark-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/

workflows:
  build-and-deploy:
    jobs:
      - test-and-build:
          filters:
            branches:
              only: /.*/
      - deploy-dev:
          context: develop
          requires:
            - test-and-build
          filters:
            branches:
              only: develop
      - deploy-stg:
          context: staging
          requires:
            - test-and-build
          filters:
            branches:
              only: staging
      - deploy-prod:
          context: production
          requires:
            - test-and-build
          filters:
            branches:
              only:
                - main
                - /^hotfix.*/
